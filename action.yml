name: "Security Bot Action"
description: "Scan SBOM report and auto-fix vulnerabilities"

inputs:
  report_path:
    description: "Path to Trivy JSON report"
    required: true
    default: "security-bot/report/trivy_report.json"

# ✅ ADD THIS BLOCK
outputs:
  fix_needed:
    description: "Whether fix is required"
    value: ${{ steps.run_bot.outputs.fix_needed }}

runs:
  using: "composite"
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: Install dependencies
      run: pip install -r $GITHUB_ACTION_PATH/security-bot/requirements.txt
      shell: bash

    - name: Run Security Bot
      id: run_bot
      run: |
        OUTPUT=$(python3 $GITHUB_ACTION_PATH/security-bot/main.py)
        
        echo "=== SCRIPT OUTPUT ==="
        echo "$OUTPUT"
        echo "====================="

        # ✅ FORCE CLEAN MATCH
        if echo "$OUTPUT" | grep -q "VULNERABILITIES_FOUND"; then
          echo "fix_needed=true" >> $GITHUB_OUTPUT
          echo "DEBUG: fix_needed=true"
        else
          echo "fix_needed=false" >> $GITHUB_OUTPUT
          echo "DEBUG: fix_needed=false"
        fi
      shell: bash
